experiment_name: llama_8b_vocab_discovery_layer29mlp_base
seed: 42

model:
  name: unsloth/Llama-3.1-8B
  backend: hf
  torch_dtype: bfloat16
  device_map: auto

# This runner computes generic vocab-based feature scores.
# Point the vocabulary paths at your C and Q JSON files.
discovery:
  sae_repo: EleutherAI/sae-llama-3.1-8b-32x
  hookpoint: layers.29.mlp

  vocab_paths:
    C: data/vocabs/clarifying_vocab.json
    Q: data/vocabs/question_vocab.json

  dataset:
    source: parquet
    path: data/processed/lmsys_llama31_8b_tokenized/train.parquet
    text_column: tokens
    n_texts: 4096

  tokenization:
    max_length: 256
    stride: 256
    add_special_tokens: false
    kind: pretokenized

  batching:
    token_batch_size: 8

  scoring:
    alpha: 1.0
    epsilon: 1.0e-12
    expand_range: [0, 0]
    ignore_special_tokens: true
    ignore_token_ids: []

  output:
    root_dir: outputs/discovery
    top_k: 100
