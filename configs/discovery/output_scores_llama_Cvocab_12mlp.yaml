experiment_name: llama32_1b_vocab_discovery_layer12mlp
seed: 42

model:
  name: unsloth/Llama-3.2-1B-Instruct
  backend: hf
  torch_dtype: float16
  device_map: auto

output_scoring:
  name: C_topk50
  root_dir: outputs/discovery
  feature_scores_path: outputs/discovery/llama_vocab_discovery_layer12mlp/C/feature_scores.pt
  feature_score_key: scores
  top_k_features: 50
  # feature_indices: [1, 2, 3]  # optional manual override

  sae_repo: EleutherAI/sae-Llama-3.2-1B-131k
  hookpoint: layers.12.mlp

  prompt: "In my experience,"
  steering_strength: 6.0
  top_k_tokens: 10

  tokenization:
    max_length: 256
    stride: 256
    add_special_tokens: false
    kind: pretokenized

  batching:
    token_batch_size: 8

  amax_dataset:
    source: parquet
    path: data/processed/lmsys_llama32_1b_tokenized/train.parquet
    text_column: tokens
    n_texts: 4096
