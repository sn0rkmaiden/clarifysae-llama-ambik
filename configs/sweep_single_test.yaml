experiment_name: steer_generated_tokens_single_test
base_config: configs/steer_llama32_1b.yaml
sweep:
  mode: single_feature_strength
  strengths: [0.1, 0.5, 1.0, 3.0, 5.0]
  groups:
    - vocab: C
      hookpoint: layers.10.mlp
      features: [11288]
    - vocab: Q
      hookpoint: layers.12.mlp
      features: [3557]

  storage:
    layout: flat
    keep_generated_configs: false
    keep_predictions: false
    keep_predictions_full: false
    keep_results: true
    keep_results_full: false
    keep_example_metrics: false
    keep_aggregate_metrics: false
    keep_category_metrics: false
    cleanup_tmp_run_dirs: true