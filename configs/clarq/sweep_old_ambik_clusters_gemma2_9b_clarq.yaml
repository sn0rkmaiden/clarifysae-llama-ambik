experiment_name: gemma2_9b_old_ambik_cluster_strength_sweep_clarq
base_config: configs/clarq/gemma2_9b_clarq_sweep_base.yaml

# Exact old AmbiK cluster-steering sets recovered from
# SAE-Reasoning/extraction/clusters/*/features_clustered.csv.
# Each feature set is the same top-N cluster membership used by old result filenames
# such as ambik_cluster_9b_allvocabs_l20_thr0.6_nclust3_cluster2_multi10_str5.0.json.
# These are the clusters reported in the AmbiK multi-feature table.

sweep:
  mode: multi_feature_strength
  strengths: [1.0, 3.0, 5.0, 10.0]
  groups:
    - vocab: old_ambik_clusters_l09
      hookpoint: blocks.9.hook_resid_post
      module_path: model.layers.9
      sae_repo: gemma-scope-9b-it-res-canonical
      sae_id: layer_9/width_16k/canonical
      normalize_each: false
      norm_cap: null
      feature_sets:
        - label: ambik_cluster_9b_allvocabs_l09_thr0.6_nclust3_cluster0_multi10
          features: [81, 249, 642, 9, 165, 227, 198, 526, 597, 417]
        - label: ambik_cluster_9b_allvocabs_l09_thr0.6_nclust3_cluster1_multi10
          features: [512, 199, 92, 643, 251, 561, 529, 125, 131, 432]
        - label: ambik_cluster_9b_allvocabs_l09_thr0.6_nclust3_cluster2_multi3
          features: [785, 509, 354]
        - label: ambik_cluster_9b_allvocabs_l09_thr0.6_nclust5_cluster4_multi10
          features: [526, 400, 406, 622, 804, 636, 398, 549, 550, 695]

    - vocab: old_ambik_clusters_l20
      hookpoint: blocks.20.hook_resid_post
      module_path: model.layers.20
      sae_repo: gemma-scope-9b-it-res-canonical
      sae_id: layer_20/width_16k/canonical
      normalize_each: false
      norm_cap: null
      feature_sets:
        - label: ambik_cluster_9b_allvocabs_l20_thr0.6_nclust3_cluster2_multi10
          features: [711, 229, 565, 113, 322, 152, 584, 666, 182, 376]

    - vocab: old_ambik_clusters_l31
      hookpoint: blocks.31.hook_resid_post
      module_path: model.layers.31
      sae_repo: gemma-scope-9b-it-res-canonical
      sae_id: layer_31/width_16k/canonical
      normalize_each: false
      norm_cap: null
      feature_sets:
        - label: ambik_cluster_9b_allvocabs_l31_thr0.6_nclust3_cluster1_multi10
          features: [264, 118, 158, 438, 93, 302, 121, 245, 124, 208]
  storage:
    layout: flat
    keep_generated_configs: false
    keep_results: true
    keep_clarq_metrics: true
    keep_clarq_summary: true
    keep_clarq_report: true
    keep_clarq_feature_dashboards: true
    cleanup_tmp_run_dirs: true
