experiment_name: visualize_outputscore_8b_layer19_C
seed: 42
model:
  name: unsloth/Llama-3.1-8B-Instruct
  backend: hf
  torch_dtype: bfloat16
  device_map: auto
output_visualization:
  loader: dictionary_learning
  sae_repo: andyrdt/saes-llama-3.1-8b-instruct
  sae_file: resid_post_layer_19/trainer_1
  hookpoint: model.layers.19
  module_path: model.layers.19
  feature_source:
    mode: from_csv
    path: visualization/data/cds2_8b_1b_new_experiments/discovery/llama31_8b_instruct_vocab_discovery_layer19resid/output_scores/C_topk50/output_scores.csv
    score_column: output_score
    top_n: 3
  prompt_source:
    use_saved_prompt: true
    prompt_column: prompt
  steering:
    delta_columns: [steering_delta, steering_scale, output_steering_delta]
    amp_columns: [amp_factor, output_amp_factor]
  plots:
    top_k_tokens: 10
    selected_token_mode: candidate_best_after
    max_candidate_tokens_for_plot: 8
    drop_unreadable_candidate_tokens: true
    show_saved_metrics_in_title: false
    show_rank_in_title: false
  output_dir: visualization/results/outputscore_8b_layer19_C
